services:
  app:
    image: docker.io/library/nginx:1.27-alpine
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    restart: unless-stopped

  up2date-agent:
    build:
      context: ../prototype/agent
    environment:
      UP2DATE_NODE_ID: local-dev-node
      UP2DATE_NODE_NAME: Local Dev Node
      UP2DATE_MQTT_HOST: mqtt
      UP2DATE_MQTT_PORT: 1883
      UP2DATE_DOCKER_SOCKET: /var/run/docker.sock
      UP2DATE_INTERVAL_SECONDS: 60
      UP2DATE_INCLUDE_STOPPED: "true"
      UP2DATE_RETAIN_MESSAGES: "true"
    labels:
      up2date.ignore: "true"
    volumes:
      - ${UP2DATE_HOST_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    security_opt:
      - label=disable
    restart: unless-stopped
