name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run Go tests
        run: go test ./...

  binaries:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Linux release archives
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          for arch in amd64 arm64; do
            package_dir="dist/up2date_${RELEASE_TAG}_linux_${arch}"
            binary_path="${package_dir}/up2date"

            mkdir -p "${package_dir}"
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build -trimpath -ldflags="-s -w" -o "${binary_path}" ./cmd/up2date
            tar -C dist -czf "dist/up2date_${RELEASE_TAG}_linux_${arch}.tar.gz" "$(basename "${package_dir}")"
            rm -rf "${package_dir}"
          done

          (
            cd dist
            sha256sum up2date_"${RELEASE_TAG}"_linux_*.tar.gz > SHA256SUMS
          )

      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/up2date_${{ github.event.release.tag_name }}_linux_amd64.tar.gz
            dist/up2date_${{ github.event.release.tag_name }}_linux_arm64.tar.gz
            dist/SHA256SUMS

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ch4rl3x
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker tags
        id: docker_tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          {
            echo "tags<<EOF"
            echo "ch4rl3x/up2date:${RELEASE_TAG}"
            if [ "${PRERELEASE}" = "false" ]; then
              echo "ch4rl3x/up2date:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
